<section class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Create New Password</h1>
            <p>Your new password must be different from your previous password.</p>
        </div>
        <form (ngSubmit)="submit()" class="auth-form">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="newPassword" [(ngModel)]="newPassword" placeholder="Enter new password"
                    autocomplete="new-password" />
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirmPassword" [(ngModel)]="confirmPassword"
                    placeholder="Confirm new password" autocomplete="new-password" />
            </div>
            <div class="error-message" *ngIf="error"> {{ error }} </div>
            <button type="submit" class="auth-btn" [disabled]="loading">
                <span *ngIf="!loading">Reset Password</span>
                <span *ngIf="loading">Resetting...</span>
            </button>
            <a routerLink="/login" class="back-link"> Back to login </a>
        </form>
    </div>
</section>

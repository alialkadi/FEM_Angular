<section class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Forgot Password?</h1>
            <p>Enter your email and we will send you a verification code.</p>
        </div>
        <form (ngSubmit)="submit()" class="auth-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" [(ngModel)]="email" placeholder="Enter your email"
                    autocomplete="email" />
            </div>
            <div class="error-message" *ngIf="error"> {{ error }} </div>
            <button type="submit" class="auth-btn" [disabled]="loading">
                <span *ngIf="!loading">Send OTP</span>
                <span *ngIf="loading">Sending...</span>
            </button>
            <a routerLink="/login" class="back-link"> Back to login </a>
        </form>
    </div>
</section>

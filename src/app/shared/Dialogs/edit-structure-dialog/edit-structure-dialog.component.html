<h2 mat-dialog-title>Edit Item</h2>
<mat-dialog-content>
    <form [formGroup]="editForm" class="dialog-form">
        <!-- Name -->
        <div class="form-group">
            <label for="itemName">Item Name <span class="required">*</span></label>
            <input id="itemName" type="text" formControlName="name" placeholder="Enter Item name"
                class="custom-input" />
        </div>
        <div class="form-group">
            <label>Description </label>
            <input type="text" formControlName="description" placeholder="e.g., ...." />
        </div>
        <!-- ✅ Category -->
        <div class="form-group">
            <label for="cat">Category <span class="required">*</span></label>
            <select formControlName="categoryId">
                <option [ngValue]="null" disabled>- Select Category -</option>
                <option *ngFor="let c of categories" [ngValue]="c.id">{{ c.name }}</option>
            </select>
        </div>
        <!-- ✅ Type -->
        <div class="form-group">
            <label for="type">Category Type <span class="required">*</span></label>
            <select formControlName="typeId" [disabled]="!types.length">
                <option [ngValue]="null" disabled>- Select Type -</option>
                <option *ngFor="let t of types" [ngValue]="t.id">{{ t.name }}</option>
            </select>
        </div>
        <!-- File -->
        <div class="file-upload">
            <input type="file" (change)="onFileSelected($event)" accept="image/*" />
            <img *ngIf="previewUrl" [src]="previewUrl" alt="preview" class="preview-img">
        </div>
    </form>
</mat-dialog-content>
<mat-dialog-actions align="end" class="dialog-actions">
    <button mat-stroked-button color="warn" (click)="onCancel()">Cancel</button>
    <button mat-flat-button color="primary" (click)="onSave()">Save</button>
</mat-dialog-actions>

<h2 mat-dialog-title>Edit Part Option</h2>
<mat-dialog-content>
    <form [formGroup]="editForm" class="dialog-form">
        <div class="form-group">
            <label>Option Name <span class="required">*</span></label>
            <input type="text" formControlName="name" class="custom-input" placeholder="Enter option name" />
        </div>
        <div class="form-group">
            <label>Description </label>
            <input type="text" formControlName="description" placeholder="e.g., ...." />
        </div>
        <!-- Category -->
        <div class="form-group">
            <label>Category <span class="required">*</span></label>
            <select formControlName="categoryId">
                <option [ngValue]="null" disabled>- Select Category -</option>
                <option *ngFor="let c of categories" [ngValue]="c.id">{{ c.name }}</option>
            </select>
        </div>
        <!-- Category Type -->
        <div class="form-group">
            <label>Category Type <span class="required">*</span></label>
            <select formControlName="categoryTypeId" [disabled]="!categoryTypes.length">
                <option [ngValue]="null" disabled>- Select Type -</option>
                <option *ngFor="let t of categoryTypes" [ngValue]="t.id">{{ t.name }}</option>
            </select>
        </div>
        <!-- Structure -->
        <div class="form-group">
            <label>Structure <span class="required">*</span></label>
            <select formControlName="structureId" [disabled]="!structures.length">
                <option [ngValue]="null" disabled>- Select Structure -</option>
                <option *ngFor="let s of structures" [ngValue]="s.id">{{ s.name }}</option>
            </select>
        </div>
        <!-- Part -->
        <div class="form-group">
            <label>Parent Part <span class="required">*</span></label>
            <select formControlName="mainPartId" [disabled]="!parts.length">
                <option [ngValue]="null" disabled>- Select Part -</option>
                <option *ngFor="let p of parts" [ngValue]="p.id">{{ p.name }}</option>
            </select>
        </div>
        <!-- File -->
        <div class="file-upload">
            <input type="file" (change)="onFileSelected($event)" accept="image/*" />
            <img *ngIf="previewUrl" [src]="previewUrl" class="preview-img" alt="preview">
        </div>
    </form>
</mat-dialog-content>
<mat-dialog-actions align="end" class="dialog-actions">
    <button mat-stroked-button color="warn" (click)="onCancel()">Cancel</button>
    <button mat-flat-button color="primary" (click)="onSave()">Save</button>
</mat-dialog-actions>

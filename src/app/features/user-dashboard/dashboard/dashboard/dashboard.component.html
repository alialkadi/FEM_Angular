<!-- dashboard.html -->
<div class="dashboard-container">
  <!-- Mobile drawer overlay -->
  <div class="nav-overlay" [class.show]="navOpen" (click)="closeNav()"></div>

  <!-- Sidebar (desktop column / mobile drawer / phone bottom-bar) -->
  <app-user-dashboard-nav
    [open]="navOpen"
    (linkClicked)="closeNav()"
  ></app-user-dashboard-nav>

  <!-- Main Section -->
  <div class="main-section">
    <!-- User Header -->
    <app-user-header (menuToggle)="toggleNav()"></app-user-header>

    <!-- Main Content -->
    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>

<header class="header">
    <div class="container">
        <nav class="nav">
            <!-- Brand -->
            <a class="brand" [routerLink]="homeRoute">
                <span class="brand__mark"></span>
                <span class="brand__name"> Fenestration <strong style="color: var(--link-hover);">Services</strong>
                </span>
            </a>
            <!-- Desktop Navigation -->
            <div class="nav__links">
                <!-- Cart -->
                <a class="nav-cart" *ngIf="cartCount" [routerLink]="cartRoute" routerLinkActive="active-link"
                    [routerLinkActiveOptions]="{ exact: true }"> Cart <span *ngIf="cartCount" class="cart-count"> {{
                        cartCount }} </span>
                </a>
                <!-- Dynamic Sections -->
                <a *ngFor="let section of sections" [routerLink]="section.route" routerLinkActive="active-link"
                    [routerLinkActiveOptions]="{ exact: true }" class="nav-item"> {{ section.title }} </a>
            </div>
            <!-- CTA -->
            <div class="nav__right">
                <button class="hamburger" (click)="toggleMenu()" [attr.aria-expanded]="mobileOpen"> ☰ </button>
            </div>
        </nav>
    </div>
</header>
<!-- Mobile -->
<div class="mobile-menu" [class.open]="mobileOpen">
    <div class="mobile-panel">
        <a class="mobile-item" *ngIf="cartCount" [routerLink]="cartRoute" (click)="closeMenu()"> Cart <span
                *ngIf="cartCount" class="cart-count"> {{ cartCount }} </span>
        </a>
        <a *ngFor="let section of sections" class="mobile-item" [routerLink]="section.route" (click)="closeMenu()"> {{
            section.title }} </a>
        <a class="btn-outline full-width" [routerLink]="quoteRoute" (click)="closeMenu()"> Free Quote </a>
    </div>
</div>

<section class="hero" aria-label="Hero">
    <div class="hero__bg" aria-hidden="true"></div>
    <div class="container">
        <div class="hero__content">
            <div class="hero__kicker">
                <span class="dot"></span>
                <span>Fenestration maintenance & replacement</span>
            </div>
            <h1 class="hero__title"> Reliable <span class="accent">Services</span> for Every Window & Door </h1>
            <p class="hero__subtitle"> Professional installation, repair, and maintenance for long-lasting performance
                and design. </p>
            <div class="hero__actions">
                <a class="btn btn--primary" [routerLink]="['/FenetrationMaintainence/Home/serviceexplorer']"> Explore
                    Services </a>
                <a class="btn btn--ghost" [routerLink]="['/public/FenestrationMaintainence/contact']"> Request a Quote
                </a>
            </div>
            <div class="hero__badges">
                <span class="badge">Real-Time Quote</span>
                <span class="badge">Licensed & Insured</span>
                <span class="badge">Fast Response</span>
                <span class="badge">Quality Guaranteed</span>
            </div>
        </div>
    </div>
</section>

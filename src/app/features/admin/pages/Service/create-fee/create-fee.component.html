<div class="create-fee-wrapper">
    <div class="fee-card">
        <div class="header">
            <h2>Create New Fee</h2>
            <p>Define a global or service-specific fee with optional linked services.</p>
        </div>
        <form [formGroup]="feeForm" (ngSubmit)="onSubmit()" class="form-body">
            <!-- Fee Name -->
            <div class="input-group">
                <label>Fee Name <span>*</span></label>
                <input type="text" class="form-control" formControlName="name" placeholder="Enter fee name" />
                <div *ngIf="feeForm.get('name')?.invalid && feeForm.get('name')?.touched" class="error"> Fee name is
                    required. </div>
            </div>
            <!-- Amount -->
            <div class="input-group">
                <label>Amount (USD) <span>*</span></label>
                <input type="number" class="form-control" formControlName="amount" placeholder="Enter amount" />
                <div *ngIf="feeForm.get('amount')?.invalid && feeForm.get('amount')?.touched" class="error"> Amount must
                    be a positive number. </div>
            </div>
            <!-- Description -->
            <div class="input-group full">
                <label>Description</label>
                <textarea class="form-control" rows="3" formControlName="description"
                    placeholder="Optional: describe this fee’s purpose"></textarea>
            </div>
            <!-- Global Toggle -->
            <div class="toggle-row">
                <label class="toggle-label">Apply Globally?</label>
                <label class="switch">
                    <input type="checkbox" formControlName="isGlobal" (change)="toggleGlobal()" />
                    <span class="slider"></span>
                </label>
            </div>
            <!-- Linked Services -->
            <div *ngIf="!isGlobal" class="input-group full fade-in">
                <label>Category</label>
                <select class="form-control" [(ngModel)]="selectedCategoryId" [ngModelOptions]="{ standalone: true }"
                    (change)="onCategoryChange()">
                    <option [ngValue]="null">Select Category</option>
                    <option *ngFor="let c of categories" [ngValue]="c.id"> {{ c.name }} </option>
                </select>
                <label *ngIf="categoryTypes.length > 0">Category Type</label>
                <select *ngIf="categoryTypes.length > 0" class="form-control" [(ngModel)]="selectedTypeId"
                    [ngModelOptions]="{ standalone: true }" (change)="onTypeChange()">
                    <option [ngValue]="null">Select Type</option>
                    <option *ngFor="let t of categoryTypes" [ngValue]="t.id"> {{ t.name }} </option>
                </select>
                <label *ngIf="structures.length > 0">Structure</label>
                <select *ngIf="structures.length > 0" class="form-control" [(ngModel)]="selectedStructureId"
                    [ngModelOptions]="{ standalone: true }" (change)="onStructureChange()">
                    <option [ngValue]="null">Select Structure</option>
                    <option *ngFor="let s of structures" [ngValue]="s.id"> {{ s.name }} </option>
                </select>
                <label *ngIf="parts.length > 0">Part</label>
                <select *ngIf="parts.length > 0" class="form-control" [(ngModel)]="selectedPartId"
                    [ngModelOptions]="{ standalone: true }" (change)="onPartChange()">
                    <option [ngValue]="null">Select Part</option>
                    <option *ngFor="let p of parts" [ngValue]="p.id"> {{ p.name }} </option>
                </select>
                <label *ngIf="partOptions.length > 0">Part Option</label>
                <select *ngIf="partOptions.length > 0" class="form-control" [(ngModel)]="selectedPartOptionId"
                    [ngModelOptions]="{ standalone: true }" (change)="onPartOptionChange()">
                    <option [ngValue]="null">Select Part Option</option>
                    <option *ngFor="let o of partOptions" [ngValue]="o.id"> {{ o.name }} </option>
                </select>
                <div class="services-box" *ngIf="selectedCategoryId">
                    <div *ngIf="visibleServices.length > 0; else noServices">
                        <div class="form-check" *ngFor="let service of visibleServices">
                            <input class="form-check-input" type="checkbox"
                                [checked]="feeForm.value.serviceIds.includes(service.id)"
                                (change)="toggleServiceSelection(service.id, $event)" [id]="'service_' + service.id" />
                            <label class="form-check-label" [for]="'service_' + service.id"> {{ service.name }} </label>
                        </div>
                    </div>
                    <ng-template #noServices>
                        <p class="no-results"> No services are available for the selected level. </p>
                    </ng-template>
                </div>
            </div>
            <!-- Buttons -->
            <div class="action-row">
                <button type="submit" [disabled]="isSubmitting" class="btn-primary">
                    <span *ngIf="!isSubmitting">Create Fee</span>
                    <span *ngIf="isSubmitting" class="loading-spinner"></span>
                </button>
                <button type="button" class="btn-secondary" routerLink="/admin/dashboard/Fee">Cancel</button>
            </div>
        </form>
    </div>
</div>

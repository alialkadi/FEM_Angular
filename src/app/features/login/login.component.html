<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <h1 class="title">Sign In</h1>
      <p>Welcome back. Please login to continue.</p>
    </div>
    <form (ngSubmit)="login()" class="login-form">
      <div class="form-group">
        <label>Email Address</label>
        <input class="input" type="email" name="email" [(ngModel)]="email" placeholder="Enter your email" required
          autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="password-field">
          <input class="input" [type]="showPassword ? 'text' : 'password'" name="password" [(ngModel)]="password"
            placeholder="Enter your password" required autocomplete="current-password" />
          <button type="button" class="password-toggle" (click)="showPassword = !showPassword"
            [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'">
            <i class="fa-solid" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
          </button>
        </div>
      </div>
      <button class="btn primary" type="submit" [disabled]="loading"> {{ loading ? 'Signing In...' : 'Sign In' }}
      </button>
    </form>
    <a [routerLink]="'/FenetrationMaintainence/Home/forgot-password'" class="forgetpassword"> Forgot Password? </a>
    <div class="progress" *ngIf="loading">
      <div class="bar"></div>
    </div>
    <p *ngIf="error" class="error-text">{{ error }}</p>
  </div>
</div>
